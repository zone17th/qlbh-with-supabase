<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Sello — Sales Management Logo</title>
  <desc>Three overlapping geometric shapes forming an upward arrow with a circular accent, wordmark below</desc>

  <!-- === ICON MARK === -->
  <rect x="230" y="40" width="220" height="220" rx="36" fill="#A0522D"/>
  <rect x="255" y="65" width="170" height="170" rx="24" fill="#E35336"/>

  <!-- Bar chart bars -->
  <rect x="285" y="175" width="30" height="50" rx="5" fill="#F5F5DC"/>
  <rect x="325" y="145" width="30" height="80" rx="5" fill="#F5F5DC" opacity="0.85"/>
  <rect x="365" y="110" width="30" height="115" rx="5" fill="#F5F5DC" opacity="0.7"/>

  <!-- Arrow -->
  <polyline points="355,98 395,88 405,128" fill="none" stroke="#F4A460" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="400" cy="88" r="7" fill="#F4A460"/>

  <!-- === WORDMARK === -->
  <text x="340" y="308" text-anchor="middle" font-family="-apple-system, Helvetica Neue, sans-serif" font-weight="600" font-size="36" letter-spacing="-0.5" fill="#2C2C2A">Sello</text>
  <text x="340" y="334" text-anchor="middle" font-family="-apple-system, Helvetica Neue, sans-serif" font-weight="400" font-size="11" letter-spacing="2.5" fill="#5F5E5A">SALES MANAGEMENT</text>

  <!-- === APP ICON PREVIEW === -->
  <g transform="translate(510, 80) scale(0.38)">
    <rect x="0" y="0" width="220" height="220" rx="36" fill="#A0522D"/>
    <rect x="25" y="25" width="170" height="170" rx="24" fill="#E35336"/>
    <rect x="55" y="135" width="30" height="50" rx="5" fill="#F5F5DC"/>
    <rect x="95" y="105" width="30" height="80" rx="5" fill="#F5F5DC" opacity="0.85"/>
    <rect x="135" y="70" width="30" height="115" rx="5" fill="#F5F5DC" opacity="0.7"/>
    <polyline points="125,58 165,48 175,88" fill="none" stroke="#F4A460" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="170" cy="48" r="7" fill="#F4A460"/>
  </g>
  <text x="599" y="175" text-anchor="middle" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="10" fill="#B4B2A9">App icon</text>

  <!-- === DARK VARIANT PREVIEW === -->
  <rect x="40" y="64" width="150" height="188" rx="12" fill="#1e1e1c"/>
  <g transform="translate(52, 76) scale(0.38)">
    <rect x="0" y="0" width="220" height="220" rx="36" fill="#A0522D"/>
    <rect x="25" y="25" width="170" height="170" rx="24" fill="#E35336"/>
    <rect x="55" y="135" width="30" height="50" rx="5" fill="#F5F5DC"/>
    <rect x="95" y="105" width="30" height="80" rx="5" fill="#F5F5DC" opacity="0.85"/>
    <rect x="135" y="70" width="30" height="115" rx="5" fill="#F5F5DC" opacity="0.7"/>
    <polyline points="125,58 165,48 175,88" fill="none" stroke="#F4A460" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="170" cy="48" r="7" fill="#F4A460"/>
  </g>
  <text x="97" y="175" text-anchor="middle" font-family="-apple-system, Helvetica Neue, sans-serif" font-weight="600" font-size="18" fill="#F5F5DC">Sello</text>
  <text x="97" y="194" text-anchor="middle" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="8" fill="#B4B2A9" letter-spacing="2">SALES</text>
  <text x="97" y="234" text-anchor="middle" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="10" fill="#B4B2A9">Dark bg</text>

  <!-- Divider -->
  <line x1="40" y1="360" x2="640" y2="360" stroke="#F1EFE8" stroke-width="0.5"/>

  <!-- Color swatches -->
  <rect x="230" y="375" width="18" height="18" rx="4" fill="#E35336"/>
  <rect x="254" y="375" width="18" height="18" rx="4" fill="#F4A460"/>
  <rect x="278" y="375" width="18" height="18" rx="4" fill="#A0522D"/>
  <rect x="302" y="375" width="18" height="18" rx="4" fill="#F5F5DC" stroke="#E0DECE" stroke-width="0.5"/>
  <rect x="326" y="375" width="18" height="18" rx="4" fill="#2C2C2A"/>
</svg>